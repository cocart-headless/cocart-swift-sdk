name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: Tests (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build --configuration debug

      - name: Run tests
        run: swift test --configuration debug

  build-ios:
    name: Build (iOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app
          elif [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app
          else
            sudo xcode-select -s /Applications/Xcode_15.4.app
          fi

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -scheme CoCart \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation

  build-watchos:
    name: Build (watchOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app
          elif [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app
          else
            sudo xcode-select -s /Applications/Xcode_15.4.app
          fi

      - name: Build for watchOS Simulator
        run: |
          xcodebuild build \
            -scheme CoCart \
            -destination 'generic/platform=watchOS Simulator' \
            -skipPackagePluginValidation

  lint:
    name: Swift Package validation
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Dump package
        run: swift package dump-package

      - name: Check for unresolved dependencies
        run: swift package resolve
