name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-macos:
    name: Tests (macOS / Xcode ${{ matrix.xcode }})
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        xcode: ['15.4', '16.0']
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build --configuration debug

      - name: Run tests
        run: swift test --configuration debug

  test-ios:
    name: Tests (iOS Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Build for iOS
        run: |
          xcodebuild build-for-testing \
            -scheme CoCart \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipPackagePluginValidation

      - name: Run tests on iOS
        run: |
          xcodebuild test-without-building \
            -scheme CoCart \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -skipPackagePluginValidation

  test-watchos:
    name: Build (watchOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Build for watchOS
        run: |
          xcodebuild build \
            -scheme CoCart \
            -destination 'platform=watchOS Simulator,name=Apple Watch Ultra 2 (49mm),OS=latest' \
            -skipPackagePluginValidation

  lint:
    name: Swift Package validation
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Dump package
        run: swift package dump-package

      - name: Check for unresolved dependencies
        run: swift package resolve
